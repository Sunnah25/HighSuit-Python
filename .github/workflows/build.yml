name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'   # Triggers only on version tags like v1.0.0, v1.1.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name HighSuit `
            --icon assets/icon.ico `
            --add-data "assets;assets" `
            --hidden-import pygame `
            --hidden-import pygame.mixer `
            --hidden-import numpy `
            --hidden-import src.ui `
            --hidden-import src.game `
            --hidden-import src.card `
            --hidden-import src.deck `
            --hidden-import src.hand `
            --hidden-import src.player `
            --hidden-import src.scores `
            --hidden-import src.sound `
            run.py

      - name: Upload EXE as Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HighSuit.exe
          name: HighSuit ${{ github.ref_name }}
          body: |
            ## HighSuit ${{ github.ref_name }}

            ### 🚀 Install
            Download `HighSuit.exe` below and run it — no Python needed.

            ### 🎮 What's new
            See commit history for changes in this release.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}